    letter-spacing: 2px; text-transform: uppercase;

  }

  .node-bg { transition: all 0.3s; }
  .node-group:hover .node-bg { filter: brightness(1.4); }
  .node-icon { font-size: 18px; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
  .node-label {

    stroke-width: 1;

// ── Category Colors ──
const CAT_COLORS = {
  creation: { bg: "#312e81", ring: "#6366f1", text: "#a5b4fc" },
  dev:      { bg: "#0f3d5c", ring: "#22d3ee", text: "#67e8f9" },

};
const CAT_ORDER = ["creation","dev","process","quality","business","special"];

// ════════════════════════════════════════════════════════════════
// GRAPH SETUP
// ════════════════════════════════════════════════════════════════
const svg = document.getElementById('graph-svg');
const NS = 'http://www.w3.org/2000/svg';
let width, height;
let simulation = null;
let nodeElements = {}, edgeElements = {}, labelElements = {};
let activeFilter = 'all';
let activeId = null;
let searchQuery = '';
let allIds = Object.keys(SKILLS);

// ── Resize ──
function resize() {
  const c = document.getElementById('graph-container');
  width = c.clientWidth;
  height = c.clientHeight;
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
}
window.addEventListener('resize', resize);

// ── Force Simulation ──
function buildGraph() {
  resize();

  // Clear
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Build node data
  const nodes = allIds.map(id => {
    const s = SKILLS[id];
    const col = CAT_COLORS[s.category] || CAT_COLORS.process;
    return { id, ...s, color: col };
  });
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  // Build edge data
  const edges = EDGES.filter(([s, t]) => nodeMap[s] && nodeMap[t]).map(([s, t]) => ({ s, t }));

  // Defs: arrows, gradients, glows
  const defs = document.createElementNS(NS, 'defs');

  // Arrow marker
  const marker = document.createElementNS(NS, 'marker');
  marker.setAttribute('id', 'arrow');
  marker.setAttribute('viewBox', '0 0 10 10');
  marker.setAttribute('refX', '20');
  marker.setAttribute('refY', '5');
  marker.setAttribute('markerWidth', '5');
  marker.setAttribute('markerHeight', '5');
  marker.setAttribute('orient', 'auto-start-reverse');
  const arrowPath = document.createElementNS(NS, 'path');
  arrowPath.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
  arrowPath.setAttribute('fill', 'rgba(255,255,255,0.08)');
  marker.appendChild(arrowPath);
  defs.appendChild(marker);

  // Glow filters per category
  CAT_ORDER.forEach(cat => {
    const filter = document.createElementNS(NS, 'filter');
    filter.setAttribute('id', `glow-${cat}`);
    filter.setAttribute('x', '-50%'); filter.setAttribute('y', '-50%');
    filter.setAttribute('width', '200%'); filter.setAttribute('height', '200%');
    const blur = document.createElementNS(NS, 'feGaussianBlur');
    blur.setAttribute('stdDeviation', '3');
    blur.setAttribute('result', 'blur');
    filter.appendChild(blur);
    const merge = document.createElementNS(NS, 'feMerge');
    const m1 = document.createElementNS(NS, 'feMergeNode'); m1.setAttribute('in', 'blur');
    const m2 = document.createElementNS(NS, 'feMergeNode'); m2.setAttribute('in', 'SourceGraphic');
    merge.appendChild(m1); merge.appendChild(m2);
    filter.appendChild(merge);
    defs.appendChild(filter);
  });
  svg.appendChild(defs);

  // ── Edges group ──
  const edgeGroup = document.createElementNS(NS, 'g');
  edgeGroup.setAttribute('class', 'edges');
  svg.appendChild(edgeGroup);

  edges.forEach(e => {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('class', 'edge-line');
    line.setAttribute('marker-end', 'url(#arrow)');
    line.setAttribute('data-source', e.s);
    line.setAttribute('data-target', e.t);
    edgeGroup.appendChild(line);
    edgeElements[e.s + '→' + e.t] = line;
  });

  // ── Nodes group ──
  const nodeGroup = document.createElementNS(NS, 'g');
  nodeGroup.setAttribute('class', 'nodes');
  svg.appendChild(nodeGroup);

  nodes.forEach(n => {
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'node-group');
    g.setAttribute('data-id', n.id);
    g.setAttribute('data-category', n.category);
    g.setAttribute('data-type', n.type.toLowerCase());

    // Ring
    const ring = document.createElementNS(NS, 'circle');
    ring.setAttribute('r', '24');
    ring.setAttribute('class', 'node-ring');
    ring.setAttribute('stroke', n.color.ring);
    g.appendChild(ring);

    // BG circle
    const bg = document.createElementNS(NS, 'circle');
    bg.setAttribute('r', '18');
    bg.setAttribute('class', 'node-bg');
    bg.setAttribute('fill', n.color.bg);
    bg.setAttribute('stroke', 'none');
    g.appendChild(bg);

    // Icon text
    const icon = document.createElementNS(NS, 'text');
    icon.setAttribute('class', 'node-icon');
    icon.setAttribute('dominant-baseline', 'central');
    icon.setAttribute('text-anchor', 'middle');
    icon.setAttribute('y', '1');
    icon.textContent = n.icon;
    g.appendChild(icon);

    // Label
    const label = document.createElementNS(NS, 'text');
    label.setAttribute('class', 'node-label');
    label.setAttribute('y', '32');
    label.setAttribute('data-id', n.id);
    label.textContent = n.name;
    g.appendChild(label);
    labelElements[n.id] = label;

    // Click
    g.addEventListener('click', () => showInfo(n.id));
    g.addEventListener('mouseenter', () => highlightNode(n.id));
    g.addEventListener('mouseleave', () => unhighlightNode());

    nodeGroup.appendChild(g);
    nodeElements[n.id] = { g, ring, bg, icon };
  });

  // ── Simulation ──
  const simNodes = nodes.map(n => ({ ...n, x: width/2 + (Math.random()-0.5)*width*0.6, y: height/2 + (Math.random()-0.5)*height*0.4 }));

  simulation = {
    nodes: simNodes,
    edges,
    tick() {
      const centerX = width/2, centerY = height/2;
      const k = 0.02;

      // Group nodes by category for cluster layout
      const catRadii = { creation: 200, dev: 180, process: 160, quality: 140, business: 190, special: 170 };
      const catAngles = {};
      CAT_ORDER.forEach((c, i) => { catAngles[c] = (i / CAT_ORDER.length) * Math.PI * 2; });
      const catCounts = {};
      this.nodes.forEach(n => { catCounts[n.category] = (catCounts[n.category] || 0) + 1; });

      // Force: center attraction
      const centerForce = 0.008;
      this.nodes.forEach(n => {
        n.vx = (n.vx || 0) * 0.95;
        n.vy = (n.vy || 0) * 0.95;
        n.vx += (centerX - n.x) * centerForce;
        n.vy += (centerY - n.y) * centerForce;
      });

      // Force: category clusters
      const clusterForce = 0.006;
      const nodeSpacing = (Math.PI * 2) / Math.max(catCounts[n.category] || 4, 1);
      let idx = {};
      CAT_ORDER.forEach(c => idx[c] = 0);
      this.nodes.forEach(n => {
        const total = catCounts[n.category] || 4;
        const i = idx[n.category];
        const angle = catAngles[n.category] + (i / total) * Math.PI * 0.8 - Math.PI * 0.4;
        const targetX = centerX + Math.cos(angle) * (catRadii[n.category] || 160);
        const targetY = centerY + Math.sin(angle) * (catRadii[n.category] || 160);
        n.vx += (targetX - n.x) * clusterForce;
        n.vy += (targetY - n.y) * clusterForce;
        idx[n.category]++;
      });

      // Force: repulsion
      const repulsion = 400;
      for (let i = 0; i < this.nodes.length; i++) {
        for (let j = i + 1; j < this.nodes.length; j++) {
          const a = this.nodes[i], b = this.nodes[j];
          let dx = a.x - b.x, dy = a.y - b.y;
          let dist = Math.sqrt(dx*dx + dy*dy) || 1;
          let force = repulsion / (dist * dist);
          if (dist < 60) force *= 3;  // keep nodes apart
          if (dist < 30) force *= 5;
          a.vx += (dx / dist) * force;
          a.vy += (dy / dist) * force;
          b.vx -= (dx / dist) * force;
          b.vy -= (dy / dist) * force;
        }
      }

      // Edge tension
      const edgeForce = 0.0004;
      this.edges.forEach(e => {
        const a = this.nodes.find(n => n.id === e.s);
        const b = this.nodes.find(n => n.id === e.t);
        if (!a || !b) return;
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const ideal = 120;
        const f = (dist - ideal) * edgeForce;
        a.vx -= (dx / dist) * f;
        a.vy -= (dy / dist) * f;
        b.vx += (dx / dist) * f;
        b.vy += (dy / dist) * f;
      });

      // Apply velocities
      this.nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.x = Math.max(40, Math.min(width - 40, n.x));
        n.y = Math.max(40, Math.min(height - 40, n.y));
        // Store fixed position flag
        n.fixed = false;
      });

      // Render
      this.render();
    },
    render() {
      const nodeMap = {};
      this.nodes.forEach(n => nodeMap[n.id] = n);

      // Update node positions
      this.nodes.forEach(n => {
        const el = nodeElements[n.id];
        if (!el) return;
        el.g.setAttribute('transform', `translate(${n.x},${n.y})`);
      });

      // Update edge positions
      this.edges.forEach(e => {
        const line = edgeElements[e.s + '→' + e.t];
        if (!line) return;
        const a = nodeMap[e.s], b = nodeMap[e.t];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const r = 22;
        const sx = a.x + (dx / dist) * r;
        const sy = a.y + (dy / dist) * r;
        const tx = b.x - (dx / dist) * r;
        const ty = b.y - (dy / dist) * r;
        line.setAttribute('x1', sx);
        line.setAttribute('y1', sy);
        line.setAttribute('x2', tx);
        line.setAttribute('y2', ty);
      });
    }
  };

  // Animation loop
  let animId;
  function animate() {
    simulation.tick();
    animId = requestAnimationFrame(animate);
  }
  animate();

  // Stop animation after it settles
  setTimeout(() => { if (animId) cancelAnimationFrame(animId); }, 8000);

  // ── Initial filter ──
  applyFilter('all');
}

// ════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════

function applyFilter(filter) {
  activeFilter = filter;
  let visibleCount = 0;

  allIds.forEach(id => {
    const s = SKILLS[id];
    const el = nodeElements[id];
    if (!el) return;

    let visible = true;
    if (filter === 'superpowers' && s.type !== 'Superpowers') visible = false;
    else if (filter === 'custom' && s.type !== 'Custom') visible = false;
    else if (filter !== 'all' && filter !== 'superpowers' && filter !== 'custom') {
      if (s.category !== filter) visible = false;
    }

    el.g.style.display = visible ? '' : 'none';
    if (visible) visibleCount++;
  });

  // Show/hide edges based on both endpoints being visible
  Object.keys(edgeElements).forEach(key => {
    const [s, t] = key.split('→');
    const sEl = nodeElements[s], tEl = nodeElements[t];
    const sVis = sEl && sEl.g.style.display !== 'none';
    const tVis = tEl && tEl.g.style.display !== 'none';
    edgeElements[key].style.display = (sVis && tVis) ? '' : 'none';
  });

  document.getElementById('count-visible').textContent = visibleCount;

  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
}

function highlightNode(id) {
  const s = SKILLS[id];
  if (!s) return;

  // Dim all nodes
  allIds.forEach(nid => {
    const el = nodeElements[nid];
    if (!el) return;
    if (nid === id) {
      el.ring.classList.add('active');
      el.bg.setAttribute('filter', `url(#glow-${s.category})`);
    } else {
      el.g.style.opacity = '0.25';
    }
  });

  // Highlight connected edges
  Object.keys(edgeElements).forEach(key => {
    const [src, tgt] = key.split('→');
    if (src === id || tgt === id) {
      edgeElements[key].classList.add('active');
    }
  });
}

function unhighlightNode() {
  allIds.forEach(nid => {
    const el = nodeElements[nid];
    if (!el) return;
    el.ring.classList.remove('active');
    el.bg.removeAttribute('filter');
    el.g.style.opacity = '1';
  });
  Object.keys(edgeElements).forEach(key => {
    edgeElements[key].classList.remove('active');
  });
}

function showInfo(id) {
  const s = SKILLS[id];
  if (!s) return;
  activeId = id;

  const panel = document.getElementById('info-panel');
  const col = CAT_COLORS[s.category] || CAT_COLORS.process;

  document.getElementById('p-name').textContent = `${s.icon} ${s.name}`;
  document.getElementById('p-badge').textContent = s.type;
  document.getElementById('p-badge').style.background = col.bg;
  document.getElementById('p-badge').style.color = col.text;
  document.getElementById('p-category').textContent = `Category: ${s.category.toUpperCase()} · ${s.tags.slice(0,4).join(' · ')}`;
  document.getElementById('p-desc').textContent = s.description;
  document.getElementById('p-meta').innerHTML = `📁 ${s.path} · ${s.type}`;

  panel.classList.add('visible');
}

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  let visibleCount = 0;

  allIds.forEach(id => {
    const s = SKILLS[id];
    const el = nodeElements[id];
    if (!el) return;

    // Apply both type filter and search
    let visible = true;
    if (activeFilter === 'superpowers' && s.type !== 'Superpowers') visible = false;
    else if (activeFilter === 'custom' && s.type !== 'Custom') visible = false;
    else if (activeFilter !== 'all' && activeFilter !== 'superpowers' && activeFilter !== 'custom') {
      if (s.category !== activeFilter) visible = false;
    }

    // Search filter
    if (visible && searchQuery) {
      const matchName = s.name.toLowerCase().includes(searchQuery);
      const matchDesc = s.description.toLowerCase().includes(searchQuery);
      const matchTag = s.tags.some(t => t.includes(searchQuery));
      if (!(matchName || matchDesc || matchTag)) visible = false;
    }

    el.g.style.display = visible ? '' : 'none';
    if (visible) visibleCount++;
  });

  // Edges
  Object.keys(edgeElements).forEach(key => {
    const [s, t] = key.split('→');
    const sEl = nodeElements[s], tEl = nodeElements[t];
    const sVis = sEl && sEl.g.style.display !== 'none';
    const tVis = tEl && tEl.g.style.display !== 'none';
    edgeElements[key].style.display = (sVis && tVis) ? '' : 'none';
  });

  document.getElementById('count-visible').textContent = visibleCount;
});

// ── Particles Background ──
function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];
  const count = 80;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.4 + 0.1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(192,132,252,${p.a})`;
      ctx.fill();
    });

    // Lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(192,132,252,${0.06 * (1 - dist / 150)})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}
