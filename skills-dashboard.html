<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaya Agent — Skills Handbook</title>
<style>
/* ══════════════════════════════════════
   RESET + BASE
   ══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070b15;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

/* ══════════════════════════════════════
   SCROLLBAR
   ══════════════════════════════════════ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;gap:16px;flex-wrap:wrap;
  background:linear-gradient(180deg,rgba(15,23,42,0.95) 0%,rgba(7,11,21,0.98) 100%);
  position:relative;z-index:10
}
header h1{
  font-size:18px;font-weight:700;letter-spacing:-0.02em;
  background:linear-gradient(135deg,#a78bfa,#c084fc);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;white-space:nowrap
}
header h1 span{font-weight:400;opacity:0.5;-webkit-text-fill-color:#94a3b8}
.hdr-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* Search */
.srch-wrap{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:6px 12px;transition:border .2s,background .2s;width:200px
}
.srch-wrap:focus-within{border-color:rgba(167,139,250,0.4);background:rgba(255,255,255,0.07)}
.srch-wrap svg{flex-shrink:0;opacity:0.4}
.srch-wrap input{
  background:none;border:none;outline:none;color:#e2e8f0;
  font-size:13px;font-family:inherit;width:100%
}
.srch-wrap input::placeholder{color:#475569}

/* Count badge */
.cnt-bdg{
  font-size:12px;color:#94a3b8;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:4px 10px;white-space:nowrap
}

/* ══════════════════════════════════════
   FILTERS
   ══════════════════════════════════════ */
.filters{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  padding:10px 24px;border-bottom:1px solid rgba(255,255,255,0.04);
  overflow-x:auto;flex-wrap:nowrap;background:rgba(7,11,21,0.6)
}
.fbtn{
  font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.06);background:transparent;color:#94a3b8;
  cursor:pointer;white-space:nowrap;transition:all .15s;
  font-family:inherit;user-select:none
}
.fbtn:hover{border-color:rgba(167,139,250,0.3);color:#c4b5fd}
.fbtn.on{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.35);color:#a78bfa}
.fbtn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.fbtn-sp{color:#fbbf24}.fbtn-sp.on{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24}
.fbtn-cu{color:#34d399}.fbtn-cu.on{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.3);color:#34d399}

/* ══════════════════════════════════════
   GRID
   ══════════════════════════════════════ */
.main-scroll{flex:1;overflow-y:auto;padding:20px 24px 32px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px
}

/* ══════════════════════════════════════
   SKILL CARD
   ══════════════════════════════════════ */
.card{
  position:relative;border-radius:10px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  padding:16px;cursor:pointer;transition:all .2s;user-select:none
}
.card:hover{
  background:rgba(255,255,255,0.06);border-color:rgba(167,139,250,0.25);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)
}
.card:active{transform:translateY(0);background:rgba(255,255,255,0.04)}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-icon{font-size:22px;line-height:1;flex-shrink:0}
.card-name{
  font-size:13px;font-weight:600;color:#e2e8f0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.card-desc{
  font-size:11.5px;color:#64748b;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.card-btm{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.card-tag{
  font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;
  text-transform:uppercase;letter-spacing:0.03em;line-height:1.4
}

/* ══════════════════════════════════════
   INFO PANEL
   ══════════════════════════════════════ */
.panel-overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.5);
  opacity:0;pointer-events:none;transition:opacity .3s
}
.panel-overlay.open{opacity:1;pointer-events:auto}
.panel{
  position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;z-index:51;
  background:linear-gradient(180deg,#0f172a 0%,#070b15 100%);
  border-left:1px solid rgba(255,255,255,0.06);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:-8px 0 40px rgba(0,0,0,0.5)
}
.panel.open{transform:translateX(0)}
.phead{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 24px 12px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;gap:12px
}
.phead-left{display:flex;align-items:center;gap:10px;min-width:0}
.phead-icon{font-size:26px;flex-shrink:0}
.phead-text{min-width:0}
.phead-name{font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phead-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.phead-cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.phead-type{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.03em}
.pcls{
  background:none;border:none;color:#64748b;cursor:pointer;
  padding:4px;border-radius:4px;transition:color .15s;flex-shrink:0;font-size:16px
}
.pcls:hover{color:#e2e8f0}
.pbody{padding:16px 24px 24px;overflow-y:auto;flex:1}

/* -- Sections -- */
.psec{margin-bottom:20px}
.psec:last-child{margin-bottom:0}
.psec-title{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px
}
.psec-title svg{opacity:0.5}

/* Description */
.pdesc{font-size:13.5px;line-height:1.7;color:#94a3b8}

/* Workflow Example */
.pex-box{
  background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.12);
  border-radius:8px;padding:14px 16px;position:relative
}
.pex-box::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#a78bfa,#c084fc);border-radius:3px 0 0 3px
}
.pex-text{font-size:13px;line-height:1.7;color:#c4b5fd;font-style:italic}

/* Related Skills */
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rel-chip{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;border-radius:6px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;transition:all .15s;font-size:12px;font-weight:500;color:#94a3b8
}
.rel-chip:hover{
  background:rgba(255,255,255,0.07);border-color:rgba(167,139,250,0.25);color:#e2e8f0
}
.rel-chip-icon{font-size:16px;flex-shrink:0}
.rel-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Tags row */
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.ptag{
  font-size:10px;padding:2px 8px;border-radius:3px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#64748b
}

/* Path */
.ppath-wrap{background:rgba(0,0,0,0.25);border-radius:6px;padding:8px 12px}
.ppath-label{font-size:10px;color:#475569;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.03em}
.ppath{
  font-size:11.5px;color:#64748b;word-break:break-all;
  font-family:'SF Mono',Consolas,'Courier New',monospace
}

/* ══════════════════════════════════════
   EMPTY STATE
   ══════════════════════════════════════ */
.empty{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;text-align:center;grid-column:1/-1
}
.empty.sh{display:flex}
.empty svg{margin-bottom:16px;opacity:0.2}
.empty p{font-size:14px;color:#475569}

/* ══════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════ */
@media(max-width:900px){
  header{padding:12px 16px}
  header h1{font-size:16px}
  .srch-wrap{width:160px}
  .filters{padding:8px 16px;gap:4px}
  .main-scroll{padding:12px 16px 24px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
  .panel{width:100%}
  .rel-grid{grid-template-columns:1fr}
}
@media(max-width:500px){
  header h1{font-size:14px;width:100%}
  .hdr-right{width:100%}.srch-wrap{flex:1}
  .grid{grid-template-columns:1fr 1fr;gap:8px}
  .card{padding:12px}.card-icon{font-size:18px}.card-name{font-size:12px}
}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <h1>✦ Gaya<span>·handbook</span></h1>
  <div class="hdr-right">
    <div class="srch-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search skills…" spellcheck="false" autocomplete="off">
    </div>
    <div class="cnt-bdg"><span id="vcount">36</span> / 36</div>
  </div>
</header>

<!-- ═══ FILTERS ═══ -->
<div class="filters" id="filters"></div>

<!-- ═══ MAIN GRID ═══ -->
<div class="main-scroll" id="scroll">
  <div class="grid" id="grid">
    <div class="empty sh" id="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No skills match your search</p>
    </div>
  </div>
</div>

<!-- ═══ PANEL OVERLAY ═══ -->
<div class="panel-overlay" id="ovr"></div>

<!-- ═══ INFO PANEL ═══ -->
<div class="panel" id="panel">
  <div class="phead">
    <div class="phead-left">
      <span class="phead-icon" id="picon"></span>
      <div class="phead-text">
        <div class="phead-name" id="pname"></div>
        <div class="phead-meta">
          <span class="phead-cat" id="pcat" style="color:#a78bfa"></span>
          <span class="phead-type" id="ptype"></span>
        </div>
      </div>
    </div>
    <button class="pcls" id="pcls" aria-label="Close">✕</button>
  </div>
  <div class="pbody" id="pbody"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA — every skill has:
//   n=name, i=icon, c=category, t=type, d=description,
//   p=path, g=tags, ex=workflow example, r=related skill IDs
// ═══════════════════════════════════════════════════
const S={
  // ── Superpowers: Process ──
  "sbr":{n:"Brainstorming",i:"💡",c:"process",t:"Superpowers",
    d:"Socratic design refinement. No implementation without spec.",
    ex:"Before writing any code for a new feature, invoke Brainstorming first — it explores the user's intent, requirements, edge cases, and design tradeoffs through structured dialogue so you never build the wrong thing.",
    r:["swp","sgm","sba","std"],
    p:"skills/brainstorming/",g:["planning","design","spec","dialogue"]},
  "swp":{n:"Writing Plans",i:"📝",c:"process",t:"Superpowers",
    d:"Bite-sized plans from specs. File paths, code, commands. No TBD.",
    ex:"After a brainstorming session resolves the 'what', use Writing Plans to convert the spec into a structured implementation plan with exact file paths, code snippets, and shell commands — no TBDs or ambiguity allowed.",
    r:["sbr","sep","std","sdp"],
    p:"skills/writing-plans/",g:["planning","spec","implementation"]},
  "std":{n:"TDD",i:"🔄",c:"process",t:"Superpowers",
    d:"Red-Green-Refactor. No code without failing test first.",
    ex:"When implementing a critical business rule, write a failing test first (Red), then the minimum code to pass (Green), then refactor safely. The test stays as living documentation forever.",
    r:["swp","svb","srq","sdb"],
    p:"skills/test-driven-development/",g:["testing","tdd","discipline"]},
  "sep":{n:"Executing Plans",i:"▶",c:"process",t:"Superpowers",
    d:"Runs plans with checkpoints, verification, handoff to finish.",
    ex:"After Writing Plans produces a step-by-step spec, dispatch it to Executing Plans — it runs each step with checkpoints, verifies intermediate outputs, and hands off to Finish Branch when complete.",
    r:["swp","sfc","svb","sdp"],
    p:"skills/executing-plans/",g:["execution","checkpoints","verification"]},
  "sgw":{n:"Git Worktrees",i:"🌿",c:"process",t:"Superpowers",
    d:"Isolated workspaces. Prefers native tools, falls back to git.",
    ex:"When juggling a hotfix on main alongside a feature branch, use Git Worktrees to check out each branch in its own directory — no stashing, no switching, no context loss.",
    r:["sfc","sep","sdp"],
    p:"skills/using-git-worktrees/",g:["git","worktree","isolation"]},
  "sdp":{n:"Dispatch Parallel",i:"⚡",c:"process",t:"Superpowers",
    d:"Split 2+ independent tasks into parallel subagent work.",
    ex:"When a feature has independent frontend and backend work, use Dispatch Parallel to spawn two subagents simultaneously — no shared state, no conflicts, 2× throughput.",
    r:["ssd","sep","swp"],
    p:"skills/dispatching-parallel-agents/",g:["parallel","subagent","efficiency"]},
  "sba":{n:"Brainstorming Alt",i:"🧠",c:"process",t:"Superpowers",
    d:"Alternative brainstorming: divergent→convergent→commit.",
    ex:"When the team is stuck on a design decision, use Brainstorming Alt: first diverge (generate many ideas), then converge (narrow to one), then commit. Great for creative blocks.",
    r:["sbr","swp","sgm"],
    p:"skills/brainstorming/",g:["planning","design","alternative"]},
  "ssd":{n:"Subagent Dev",i:"🤖",c:"process",t:"Superpowers",
    d:"Fresh subagent per task + two-stage spec+quality review.",
    ex:"For a complex multi-file feature, spawn a dedicated subagent per file with a spec stage (describe intent) and quality stage (review output) — each subagent is fresh, focused, and verifiable.",
    r:["sdp","srq","swp","sep"],
    p:"skills/subagent-driven-development/",g:["subagent","parallel","review"]},

  // ── Superpowers: Quality ──
  "srq":{n:"Request Review",i:"👁",c:"quality",t:"Superpowers",
    d:"Code reviewer subagent. Critical→fix, Important→fix, Minor→note.",
    ex:"After completing an implementation, spawn a reviewer subagent via Request Review — it reads the diff, classifies issues as Critical (must fix), Important (should fix), or Minor (note only).",
    r:["src","std","svb","sfc"],
    p:"skills/requesting-code-review/",g:["review","code-quality","feedback"]},
  "src":{n:"Receive Review",i:"📬",c:"quality",t:"Superpowers",
    d:"READ→VERIFY→EVALUATE→RESPOND. Push back with evidence.",
    ex:"When a reviewer flags an issue, follow RECEIVE: read the comment, verify the claim with a test, evaluate if the fix is correct, then respond with evidence — even if that means pushing back.",
    r:["srq","sdb","std"],
    p:"skills/receiving-code-review/",g:["review","feedback","rigor"]},
  "sdb":{n:"Systematic Debug",i:"🔬",c:"quality",t:"Superpowers",
    d:"4-phase: Root Cause→Pattern→Hypothesis→Fix. No symptom patches.",
    ex:"When a production bug surfaces, resist the urge to hotfix the symptom. Instead, trace the root cause, identify the pattern, form a hypothesis, and fix at the source — the bug stays dead.",
    r:["std","svb","src","arc"],
    p:"skills/systematic-debugging/",g:["debugging","root-cause","rigor"]},
  "svb":{n:"Verify Before Done",i:"✅",c:"quality",t:"Superpowers",
    d:"No completion claims without fresh test/lint/build evidence.",
    ex:"Before any 'done' claim, run the full verification battery — lint, typecheck, and test suite — and confirm green output. No assumptions. No 'it worked last time'. Fresh evidence only.",
    r:["std","sfc","srq"],
    p:"skills/verification-before-completion/",g:["verification","testing","evidence"]},
  "sfc":{n:"Finish Branch",i:"🚀",c:"quality",t:"Superpowers",
    d:"Implementation done. Choose merge, PR, or cleanup path.",
    ex:"After all checks pass, use Finish Branch to decide the integration path: direct merge (trivial), create a PR (needs review), or cleanup (branch is stale). Each decision comes with the right git commands.",
    r:["svb","sep","sgw","srq"],
    p:"skills/finishing-a-development-branch/",g:["completion","merge","pr"]},
  "sgm":{n:"Grill Me",i:"🔥",c:"quality",t:"Superpowers",
    d:"Stress-test a plan through relentless questioning. Fork until clear.",
    ex:"Before committing to a complex architecture, invoke Grill Me to get stress-tested on every decision branch — it questions assumptions, exposes blind spots, and forks until shared understanding is reached.",
    r:["sbr","swp","src"],
    p:"skills/grill-me/",g:["review","stress-test","clarity"]},

  // ── Custom: Creation ──
  "uid":{n:"UI Design",i:"🎨",c:"creation",t:"Custom",
    d:"Full design system intelligence: 50+ styles, 161 palettes, 57 font pairings.",
    ex:"Before building any interface, use UI Design to generate a complete design system — it selects the right style (glassmorphism, minimal, brutalism), color palette, typography, and spacing for your product type.",
    r:["fend","bundle","arch","3dv"],
    p:"skills/ui-ux-pro-max/",g:["ui","ux","frontend","design"]},
  "fend":{n:"Frontend Design",i:"🖌",c:"creation",t:"Custom",
    d:"Distinctive, production-grade interfaces with high design quality.",
    ex:"When building a landing page or dashboard component, use Frontend Design to generate production-grade HTML/CSS with a unique visual identity — not generic templates, but purposeful, polished interfaces.",
    r:["uid","bundle","arch","img"],
    p:"skills/frontend-design/",g:["frontend","design","html","css"]},
  "bundle":{n:"UI Bundle Frontend",i:"🧩",c:"creation",t:"Custom",
    d:"Modify existing UI bundle apps. appLayout, shadcn, Tailwind, Salesforce routing.",
    ex:"When an existing Salesforce UI bundle app needs a new page or component, use this skill to follow the project's appLayout shell, shadcn/ui conventions, and base-path routing — no broken imports, no guesswork.",
    r:["uid","fend"],
    p:"skills/building-ui-bundle-frontend/",g:["ui","bundle","salesforce","shadcn"]},
  "3dv":{n:"3D Visualizer",i:"🌐",c:"creation",t:"Custom",
    d:"Three.js expert. Interactive 3D scenes, models, animations.",
    ex:"When a product page needs an interactive 3D viewer or an architectural walkthrough, use 3D Visualizer to create a Three.js scene with orbit controls, lighting, and animations — all in a single HTML file.",
    r:["uid","fend","viz","cpp"],
    p:"skills/3d-visualizer/",g:["3d","three.js","visualization","webgl"]},
  "arch":{n:"Architecture Diagram",i:"📐",c:"creation",t:"Custom",
    d:"Interactive click-through system architecture diagrams. Single HTML file.",
    ex:"When onboarding a new developer or designing a new microservice, use Architecture Diagram to produce an interactive click-through flow with step-by-step animations, mode toggles (dev/prod), and payload details.",
    r:["uid","arc","con","dst"],
    p:"skills/architecture-diagram/",g:["architecture","diagram","flow","visualization"]},
  "img":{n:"Image Generation",i:"🖼",c:"creation",t:"Custom",
    d:"DALL-E, Midjourney, SD prompts for any style and use case.",
    ex:"When creating visuals for a blog post, social campaign, or concept art, craft optimized prompts with proven patterns — style injection, lighting cues, composition rules — for DALL-E, Midjourney, or Stable Diffusion.",
    r:["i2v","cf","fend"],
    p:"skills/image-generation/",g:["image","prompt","generation","ai"]},
  "i2v":{n:"Image to Video",i:"🎬",c:"creation",t:"Custom",
    d:"Animate stills via RunComfy. Smart router for HappyHorse/Wan/Seedance.",
    ex:"When a still product shot needs to become a cinematic video, the smart router picks the right RunComfy model: HappyHorse for general motion, Wan for lip-sync with custom audio, Seedance for multi-modal animation.",
    r:["img","cf","pipe"],
    p:"skills/image-to-video/",g:["video","animation","runcomfy","ai"]},
  "cf":{n:"ComfyUI Workflows",i:"⚙",c:"creation",t:"Custom",
    d:"Generate node graphs from plain English. txt2img, ControlNet, LoRA, upscale.",
    ex:"When building a Stable Diffusion pipeline (txt2img with ControlNet, LoRA stacking, and upscaling), describe it in plain English and get a valid ComfyUI workflow JSON — no manual node wiring.",
    r:["img","i2v","pipe"],
    p:"skills/comfyui-workflow-builder/",g:["comfyui","workflow","stable-diffusion"]},
  "pptx":{n:"PowerPoint Builder",i:"📊",c:"creation",t:"Custom",
    d:"Create, read, edit, parse .pptx files. Decks, slides, templates.",
    ex:"When a consulting report needs a polished slide deck, use PowerPoint Builder to create, read, or edit .pptx files programmatically — templates, speaker notes, charts, and layout control.",
    r:["dst","con","prop"],
    p:"skills/pptx/",g:["powerpoint","slides","presentation","office"]},
  "dt":{n:"Digital Twin",i:"👤",c:"creation",t:"Custom",
    d:"Photorealistic AI avatars via each::sense. Video calls, content, multilingual.",

const IDS=Object.keys(S);

const CAT={
  process:{clr:"#38bdf8",lbl:"Process"},
  quality:{clr:"#fbbf24",lbl:"Quality"},
  creation:{clr:"#a78bfa",lbl:"Creation"},
  dev:{clr:"#34d399",lbl:"Dev"},
  business:{clr:"#f472b6",lbl:"Business"},
  special:{clr:"#fb923c",lbl:"Specialist"}
};
const CAT_KEYS=Object.keys(CAT);

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
const grid=document.getElementById('grid');
const empty=document.getElementById('empty');
const vcount=document.getElementById('vcount');
const search=document.getElementById('search');
const filters=document.getElementById('filters');

let activeFilter='all';
let searchQ='';

function render(){
  let html='';
  let vis=0;

  for(const id of IDS){
    const s=S[id];
    let show=true;
    if(activeFilter!=='all'){
      if(activeFilter==='superpowers'&&s.t!=='Superpowers')show=false;
      else if(activeFilter==='custom'&&s.t!=='Custom')show=false;
      else if(activeFilter!=='superpowers'&&activeFilter!=='custom'&&s.c!==activeFilter)show=false;
    }
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!s.n.toLowerCase().includes(q)&&!s.d.toLowerCase().includes(q)&&!s.g.some(g=>g.includes(q)))show=false;
    }
    if(!show)continue;
    vis++;

    const clr=CAT[s.c]?CAT[s.c].clr:'#64748b';
    html+=`<div class="card" data-id="${id}" tabindex="0" role="button" aria-label="${s.n}">
      <div class="card-top">
        <span class="card-icon">${s.i}</span>
        <span class="card-name">${s.n}</span>
      </div>
      <div class="card-desc">${s.d}</div>
      <div class="card-btm">
        <span class="card-tag" style="background:${clr}20;color:${clr}">${s.c}</span>
        <span class="card-tag" style="background:rgba(255,255,255,0.04);color:#64748b">${s.t}</span>
      </div>
    </div>`;
  }

  grid.innerHTML=html+empty.outerHTML;
  document.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>showInfo(el.dataset.id));
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')showInfo(el.dataset.id)});
  });
  empty.classList.toggle('sh',vis===0);
  vcount.textContent=vis;
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
function buildFilters(){
  let h='';
  h+=`<button class="fbtn on" data-f="all">All</button>`;
  h+=`<button class="fbtn fbtn-sp" data-f="superpowers">★ Superpowers</button>`;
  h+=`<button class="fbtn fbtn-cu" data-f="custom">● Custom</button>`;
  h+=`<span style="width:1px;height:20px;background:rgba(255,255,255,0.06);margin:0 4px;flex-shrink:0"></span>`;
  CAT_KEYS.forEach(c=>{
    h+=`<button class="fbtn" data-f="${c}"><span class="fbtn-dot" style="background:${CAT[c].clr}"></span>${CAT[c].lbl}</button>`;
  });
  filters.innerHTML=h;
  filters.querySelectorAll('.fbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      filters.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('on',x===b));
      activeFilter=b.dataset.f;
      hideInfo();
      render();
    });
  });
}

// ═══════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════
const panel=document.getElementById('panel');
const ovr=document.getElementById('ovr');
const pbody=document.getElementById('pbody');
let selId=null;

function showInfo(id){
  const s=S[id];if(!s)return;
  selId=id;
  const clr=CAT[s.c]?CAT[s.c].clr:'#94a3b8';

  // Head
  document.getElementById('picon').textContent=s.i;
  document.getElementById('pname').textContent=s.n;
  const pc=document.getElementById('pcat');
  pc.textContent=s.c.toUpperCase();pc.style.color=clr;
  const pt=document.getElementById('ptype');
  pt.textContent=s.t;
  pt.style.background=clr+'20';pt.style.color=clr;

  // Body
  let body='';

  // Description
  body+=`<div class="psec"><div class="pdesc">${s.d}</div></div>`;

  // Workflow Example
  body+=`<div class="psec">
    <div class="psec-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Workflow Example</div>
    <div class="pex-box"><div class="pex-text">${s.ex||'Practical example coming soon.'}</div></div>
  </div>`;

  // Related Skills
  if(s.r&&s.r.length){
    body+=`<div class="psec">
      <div class="psec-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Related Skills</div>
      <div class="rel-grid" id="relgrid"></div>
    </div>`;
  }

  // Tags
  if(s.g&&s.g.length){
    body+=`<div class="psec"><div class="ptags">${s.g.map(g=>`<span class="ptag">${g}</span>`).join('')}</div></div>`;
  }

  // Path
  body+=`<div class="psec"><div class="ppath-wrap"><div class="ppath-label">Path</div><div class="ppath">${s.p}</div></div></div>`;

  pbody.innerHTML=body;

  // Wire up related skill chips
  if(s.r&&s.r.length){
    const rg=document.getElementById('relgrid');
    rg.innerHTML=s.r.map(rid=>{
      const rs=S[rid];
      if(!rs)return '';
      const rclr=CAT[rs.c]?CAT[rs.c].clr:'#64748b';
      return `<div class="rel-chip" data-id="${rid}" style="border-left:2px solid ${rclr}40" tabindex="0" role="button">
        <span class="rel-chip-icon">${rs.i}</span>
        <span class="rel-chip-name">${rs.n}</span>
      </div>`;
    }).join('');
    rg.querySelectorAll('.rel-chip').forEach(el=>{
      el.addEventListener('click',()=>showInfo(el.dataset.id));
      el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')showInfo(el.dataset.id)});
    });
  }

  panel.classList.add('open');ovr.classList.add('open');
  document.body.style.overflow='hidden';
}

function hideInfo(){
  selId=null;panel.classList.remove('open');ovr.classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('pcls').addEventListener('click',hideInfo);
ovr.addEventListener('click',hideInfo);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')hideInfo();
  if(e.key==='/'&&!e.ctrlKey&&!e.metaKey){search.focus();e.preventDefault()}
});

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
search.addEventListener('input',()=>{
  searchQ=search.value;
  hideInfo();
  render();
});

// ═══════════════════════════════════════════════════
// GO
// ═══════════════════════════════════════════════════
buildFilters();
render();
</script>
</body>
</html>
